apiVersion: v1
kind: Namespace
metadata:
  name: cube-idp-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: cube-idp-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: zot}
  template:
    metadata:
      labels: {app: zot}
    spec:
      containers:
        - name: zot
          # arm64 nodes: use ghcr.io/project-zot/zot-linux-arm64 (or a multi-arch tag if available)
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.2
          ports: [{containerPort: 5000}]
          volumeMounts: [{name: data, mountPath: /var/lib/registry}]
          readinessProbe:
            httpGet: {path: /v2/, port: 5000}
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: zot
  namespace: cube-idp-system
spec:
  selector: {app: zot}
  ports: [{port: 5000, targetPort: 5000}]
