# Objects in crds/ are applied by `helm install` out-of-band and are NOT
# Go-template processed. Helm's dry-run render (and `helm template` without
# --include-crds) drops them from the manifest — the bug this fixture guards.
# A deliberate multi-doc stream to exercise ParseMultiDoc over crds/.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: widgets.example.cube-idp.io
spec:
  group: example.cube-idp.io
  scope: Namespaced
  names:
    plural: widgets
    singular: widget
    kind: Widget
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gadgets.example.cube-idp.io
spec:
  group: example.cube-idp.io
  scope: Namespaced
  names:
    plural: gadgets
    singular: gadget
    kind: Gadget
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
