apiVersion: batch/v1
kind: Job
metadata:
  name: crds-chart-certgen
  annotations:
    "helm.sh/hook": pre-install, pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "1"
    example.cube-idp.io/keep: "yes"
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: certgen
          image: busybox
          command: ["true"]
