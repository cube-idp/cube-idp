apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: packs.cube-idp.dev
  labels:
    app.kubernetes.io/part-of: cube-idp
spec:
  group: cube-idp.dev
  scope: Cluster
  names:
    kind: Pack
    listKind: PackList
    plural: packs
    singular: pack
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                version: {type: string}
                url: {type: string}
                urls: {type: array, items: {type: string}}
                authSecret: {type: string}
                authSecretRef:
                  type: object
                  properties:
                    namespace: {type: string}
                    name: {type: string}
                impliedFields:
                  type: object
                  additionalProperties: {type: string}
                ready: {type: boolean}
                # "yes" when the install carried values and/or
                # extraManifests, "no" otherwise — always present.
                customized: {type: string}
                # "oci" or "repo" — how the engine sources this
                # pack; the record writer maps absent to "oci", so always
                # present.
                delivery: {type: string}
                # p6 DEP4: the pack's RESOLVED dependency list (explicit ∪
                # implicit) — what actually gated delivery. Comma-joined
                # string for the printer column (dependsOnList below is the
                # machine-readable array twin, the authSecretRef/authSecret
                # flattened-twin precedent). Absent when the pack has no
                # deps — no deps is the common case, so absence keeps stock
                # records byte-identical to pre-p6.
                dependsOn: {type: string}
                dependsOnList: {type: array, items: {type: string}}
      additionalPrinterColumns:
        - {name: VERSION, type: string, jsonPath: .spec.version}
        - {name: URL, type: string, jsonPath: .spec.url}
        - {name: AUTH-SECRET, type: string, jsonPath: .spec.authSecret}
        - {name: READY, type: boolean, jsonPath: .spec.ready}
        - {name: CUSTOMIZED, type: string, jsonPath: .spec.customized}
        - {name: DELIVERY, type: string, jsonPath: .spec.delivery}
        - {name: DEPENDS-ON, type: string, jsonPath: .spec.dependsOn}
