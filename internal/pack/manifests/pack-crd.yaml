apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: packs.cube-idp.dev
  labels:
    app.kubernetes.io/part-of: cube-idp
spec:
  group: cube-idp.dev
  scope: Cluster
  names:
    kind: Pack
    listKind: PackList
    plural: packs
    singular: pack
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                version: {type: string}
                url: {type: string}
                urls: {type: array, items: {type: string}}
                authSecret: {type: string}
                authSecretRef:
                  type: object
                  properties:
                    namespace: {type: string}
                    name: {type: string}
                impliedFields:
                  type: object
                  additionalProperties: {type: string}
                ready: {type: boolean}
      additionalPrinterColumns:
        - {name: VERSION, type: string, jsonPath: .spec.version}
        - {name: URL, type: string, jsonPath: .spec.url}
        - {name: AUTH-SECRET, type: string, jsonPath: .spec.authSecret}
        - {name: READY, type: boolean, jsonPath: .spec.ready}
