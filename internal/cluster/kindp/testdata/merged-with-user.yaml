kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dev
nodes:
    - role: control-plane
      image: kindest/node:v1.33.1
      labels:
        corp.example/zone: local
      extraPortMappings:
        - containerPort: 30443
          hostPort: 8443
          protocol: TCP
featureGates:
    UserNamespacesSupport: true
