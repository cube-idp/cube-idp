# envoy-gateway pack: a full cube-idp gateway implementation. Set
# spec.gateway.pack: envoy-gateway in cube.yaml — this pack provides the
# GatewayClass, the Gateway named cube-idp (20-gateway.yaml), and pins the
# data-plane service to the cube-idp NodePorts via the EnvoyProxy config
# below (parametersRef).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: cube-idp
    namespace: envoy-gateway
---
# Pins the generated Envoy data-plane Service to NodePort 30443/30080 (the
# same host-port mapping packs/traefik relies on, see
# internal/cluster/kindp/merge.go) and to a stable name so CoreDNS's
# *.<host> rewrite (envoy-gateway.envoy-gateway.svc.cluster.local) resolves.
# RECONCILE (depends on the pinned envoy-gateway chart, not reachable while
# authoring this pack — network was unavailable in this environment): the
# exact EnvoyProxy spec.provider.kubernetes.envoyService schema for
# name/type/nodePort overrides — Task 13's envoy e2e smoke is the arbiter;
# if the pinned version (chart.yaml, 1.3.0) cannot pin the Service NAME via
# this field, bump the chart pin to one that can before shipping this pack.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: cube-idp
  namespace: envoy-gateway
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: NodePort
        name: envoy-gateway
        ports:
          - name: web
            port: 8000
            targetPort: 8000
            protocol: TCP
            nodePort: 30080
          - name: websecure
            port: 8443
            targetPort: 8443
            protocol: TCP
            nodePort: 30443
