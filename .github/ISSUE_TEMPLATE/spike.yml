name: Spike (timeboxed exploration)
description: Allowed — but it must terminate in an ADR PR or close-with-reason
title: "spike: "
labels: ["type:spike"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question to answer
    validations:
      required: true
  - type: input
    id: timebox
    attributes:
      label: Timebox
      description: e.g. "1 day", "4 hours". When it expires, the spike closes with its verdict.
    validations:
      required: true
  - type: dropdown
    id: exit
    attributes:
      label: Committed exit
      description: A spike may not end "open". Pick the exit now.
      options: ["ADR PR (ADR track) or close-with-reason", "close-with-reason only (no decision expected)"]
    validations:
      required: true
