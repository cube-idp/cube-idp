name: "Epic: ADR-tracked feature"
description: ADR track — a decision plus its delivery, as one epic with sub-issues
title: "[ADR-NNNN] "
labels: ["type:adr"]
body:
  - type: input
    id: adr
    attributes:
      label: ADR
      description: Path once the ADR PR exists, e.g. docs/adr/0043-multinode-mounts-ports.md (PR link until merged)
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: One paragraph. What ships when this epic closes; what is explicitly out.
    validations:
      required: true
  - type: textarea
    id: subissues
    attributes:
      label: Delivery plan
      description: One line per intended sub-issue (converted to real sub-issues once the ADR is accepted).
      placeholder: |
        - [ ] mounts apply to all nodes by default
        - [ ] extraPorts semantics per provider
        - [ ] e2e coverage
    validations:
      required: true
  - type: input
    id: milestone
    attributes:
      label: Target milestone
    validations:
      required: true
