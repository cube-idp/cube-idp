name: release-packs
on:
  push:
    branches: [main]
    paths: ["packs/**", ".github/workflows/release-packs.yaml"]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        # go.mod (single source of truth) is the only place a Go version is
        # pinned — never hardcode a version here (Tech Stack rule).
        with: {go-version-file: go.mod}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build cube-idp
        run: go build -o ./cube-idp .
      - name: push all packs (version tag + latest, one push)
        run: |
          set -euo pipefail
          NS="ghcr.io/cube-idp/packs"   # org namespace — spec docs/superpowers/specs/2026-07-16-org-migration-design.md
          for dir in packs/*/; do
            name="$(basename "$dir")"
            ./cube-idp pack push --also-tag latest "$dir" "oci://${NS}/${name}"   # tag = pack.cue version
            echo "published ${name} (+latest)"
          done
