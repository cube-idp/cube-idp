name: ci
on:
  push: {branches: [main]}
  pull_request:
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        # go.mod (single source of truth) requires a toolchain newer than the
        # plan's hardcoded "1.24" — currently go 1.26.2.
        with: {go-version-file: go.mod}
      - run: go vet ./...
      - run: go test ./... -short
      - run: make test-apply
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        # go.mod (single source of truth) requires a toolchain newer than the
        # plan's hardcoded "1.24" — currently go 1.26.2.
        with: {go-version-file: go.mod}
      # cube-idp itself creates/deletes kind clusters via the kind Go
      # library, but the e2e's lingering-cluster guard shells out to the
      # kind CLI — install it so the guard isn't inert on ubuntu-latest.
      - run: go install sigs.k8s.io/kind@latest
      # GitHub-hosted runners are amd64 and include docker; kind works out
      # of the box. The zot registry image is a multi-arch manifest list
      # (internal/registry/manifests/zot.yaml), so it resolves correctly
      # here even though local dev on Apple Silicon is arm64.
      - run: CUBE_IDP_E2E=1 go test ./tests/e2e/ -v -timeout 25m
