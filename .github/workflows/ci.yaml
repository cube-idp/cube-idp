name: ci
on:
  push: {branches: [main]}
  pull_request:
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        # go.mod (single source of truth) requires a toolchain newer than the
        # plan's hardcoded "1.24" — currently go 1.26.2.
        with: {go-version-file: go.mod}
      - run: go vet ./...
      - run: go test ./... -short
      # Guards against a hand-edit to install.yaml drifting from what the
      # generator would produce (Task 0.5(a) — the vendored Argo CD
      # manifest must stay reproducible from hack/gen-argocd-manifests.sh).
      - run: hack/gen-argocd-manifests.sh --check
      - run: make test-apply
      - run: make test-engines   # contract suite incl. envtest subtests, both engines
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        engine: [flux, argocd]   # spec §5: {kind} x {flux, argocd} x {up, diff, upgrade, down}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        # go.mod (single source of truth) requires a toolchain newer than the
        # plan's hardcoded "1.24" — currently go 1.26.2.
        with: {go-version-file: go.mod}
      # cube-idp itself creates/deletes kind clusters via the kind Go
      # library, but the e2e's lingering-cluster guard shells out to the
      # kind CLI — install it so the guard isn't inert on ubuntu-latest.
      - run: go install sigs.k8s.io/kind@latest
      # GitHub-hosted runners are amd64 and include docker; kind works out
      # of the box. The zot registry image is a multi-arch manifest list
      # (internal/registry/manifests/zot.yaml), so it resolves correctly
      # here even though local dev on Apple Silicon is arm64.
      - run: CUBE_IDP_E2E=1 CUBE_IDP_E2E_ENGINE=${{ matrix.engine }} go test ./tests/e2e/ -v -timeout 25m
